apiVersion: apps/v1
kind: Deployment
metadata:
  name: worker
  namespace: ai-tasks
spec:
  replicas: 2
  selector:
    matchLabels:
      app: worker
  template:
    metadata:
      labels:
        app: worker
    spec:
      containers:
      - name: worker
        image: rajat1004/ai-tasks-worker:ac215e78d88769867140140e58ad9b0711f09db6
        env:
        - name: MONGO_URI
          value: "mongodb://mongodb:27017/ai-tasks"
        - name: REDIS_URL
          value: "redis://redis:6379"
        resources:
          requests:
            cpu: "100m"
            memory: "128Mi"
          limits:
            cpu: "500m"
            memory: "512Mi"